apiVersion: apps/v1
kind: Deployment
metadata:
  name: windrose-server
spec:
  template:
    spec:
      imagePullSecrets:
        - name: harbor-registry-secret
      containers:
        - name: windrose
          resources:
            requests:
              cpu: "250m"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 10Gi
