apiVersion: v1
kind: Service
metadata:
  name: windrose-server
  labels:
    app.kubernetes.io/name: windrose-server
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: windrose-server
  ports:
    - name: game-tcp
      port: 7777
      targetPort: game-tcp
      protocol: TCP
    - name: game-udp
      port: 7777
      targetPort: game-udp
      protocol: UDP
    - name: dashboard
      port: 8780
      targetPort: dashboard
      protocol: TCP
