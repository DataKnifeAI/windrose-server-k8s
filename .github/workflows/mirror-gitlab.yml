---
# Mirror to GitLab after verify; GitLab CI publishes images to internal Harbor.
# Configure HARBOR_* variables on the GitLab project. GitHub: GITLAB_TOKEN for push only.
name: Mirror to GitLab

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    uses: DataKnifeAI/github-workflows/.github/workflows/reusable-game-server-mirror.yml@v1
    secrets: inherit
    with:
      gitlab_mirror_path: dk-raas/dkai/game-servers/windrose-server-k8s
      hadolint_failure_threshold: error
      hadolint_dockerfile: Dockerfile
      hadolint_dockerfile_secondary: Dockerfile.staging
      kustomize_path: deploy
