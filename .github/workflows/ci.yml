---
# Delegates to org-wide reusable workflow (DataKnifeAI/github-workflows).
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    uses: DataKnifeAI/github-workflows/.github/workflows/reusable-game-server-ci.yml@v1
    secrets: inherit
    with:
      hadolint_failure_threshold: error
      hadolint_dockerfile: Dockerfile
      hadolint_dockerfile_secondary: Dockerfile.staging
      kustomize_path: deploy
