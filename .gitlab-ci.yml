# GitLab CI: build and push images to internal Harbor.
# Variables: HARBOR_REGISTRY, HARBOR_PROJECT, HARBOR_USER, HARBOR_PASSWORD (see satisfactory-server-k8s).
stages:
  - docker

variables:
  IMAGE_NAME: windrose-server-k8s
  HARBOR_PROJECT: library

.publish-harbor: &publish-harbor
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  tags:
    - kubernetes

publish:
  stage: docker
  <<: *publish-harbor
  script:
    - |
      set -e
      if [ -z "$HARBOR_REGISTRY" ] || [ -z "$HARBOR_PROJECT" ]; then
        echo "HARBOR_REGISTRY or HARBOR_PROJECT not set"
        exit 1
      fi
      IMAGE_TAG="${CI_COMMIT_SHORT_SHA:-$CI_PIPELINE_ID}"
      OUTPUT_FLAGS="--output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest,push=true"
      OUTPUT_FLAGS="$OUTPUT_FLAGS --output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$IMAGE_TAG,push=true"
      if [ -n "$CI_COMMIT_TAG" ]; then
        OUTPUT_FLAGS="$OUTPUT_FLAGS --output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$CI_COMMIT_TAG,push=true"
      fi
      if [ -n "${HARBOR_USER:-}" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
        AUTH=$(printf '%s' "$HARBOR_USER:$HARBOR_PASSWORD" | base64 | tr -d '\n')
        mkdir -p ~/.docker
        echo "{\"auths\":{\"$HARBOR_REGISTRY\":{\"auth\":\"$AUTH\"}}}" > ~/.docker/config.json
      fi
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        $OUTPUT_FLAGS
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

publish-wine-staging:
  stage: docker
  <<: *publish-harbor
  script:
    - |
      set -e
      if [ -z "$HARBOR_REGISTRY" ] || [ -z "$HARBOR_PROJECT" ]; then
        echo "HARBOR_REGISTRY or HARBOR_PROJECT not set"
        exit 1
      fi
      IMAGE_TAG="${CI_COMMIT_SHORT_SHA:-$CI_PIPELINE_ID}"
      OUTPUT_FLAGS="--output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:wine-staging,push=true"
      OUTPUT_FLAGS="$OUTPUT_FLAGS --output type=image,name=$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:wine-staging-$IMAGE_TAG,push=true"
      if [ -n "${HARBOR_USER:-}" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
        AUTH=$(printf '%s' "$HARBOR_USER:$HARBOR_PASSWORD" | base64 | tr -d '\n')
        mkdir -p ~/.docker
        echo "{\"auths\":{\"$HARBOR_REGISTRY\":{\"auth\":\"$AUTH\"}}}" > ~/.docker/config.json
      fi
      cp Dockerfile.staging Dockerfile
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        $OUTPUT_FLAGS
      git checkout -- Dockerfile
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
