# Reference: ClusterIP backend for Envoy Gateway (same pods as primary windrose-server Service).
---
apiVersion: v1
kind: Service
metadata:
  name: windrose-server-envoy
  namespace: game-servers
  labels:
    app.kubernetes.io/name: windrose-server
    app.kubernetes.io/component: envoy-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: windrose-server
  ports:
    - name: game-tcp
      port: 7777
      targetPort: game-tcp
      protocol: TCP
    - name: game-udp
      port: 7777
      targetPort: game-udp
      protocol: UDP
    - name: dashboard
      port: 8780
      targetPort: dashboard
      protocol: TCP
